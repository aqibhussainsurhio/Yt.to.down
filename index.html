<!DOCTYPE html>
<html>
<head>
  <title>Aqib ki Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#0a0a0a;
      color:white;
    }

    /* NEON TITLE */
    .title{
      font-size:50px;
      text-align:center;
      margin-top:30px;
      color:#0ff;
      text-shadow:
        0 0 5px #0ff,
        0 0 20px #0ff,
        0 0 40px #0ff,
        0 0 80px #0ff;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow{
      from { text-shadow: 0 0 5px #0ff, 0 0 15px #0ff; }
      to   { text-shadow: 0 0 10px #0ff, 0 0 50px #0ff; }
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    /* MAIN BUTTON */
    .main-link{
      display:block;
      text-align:center;
      background:linear-gradient(90deg,#0ff,#00ff88);
      color:black;
      padding:15px;
      margin-top:20px;
      border-radius:12px;
      font-weight:bold;
      text-decoration:none;
      font-size:18px;
    }

    .main-link:hover{
      opacity:0.8;
    }

    .section{
      margin-top:30px;
    }

    .card{
      background:#151515;
      padding:15px;
      margin:10px 0;
      border-radius:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .btn{
      background:#0ff;
      color:#000;
      padding:8px 15px;
      border-radius:8px;
      text-decoration:none;
      font-weight:bold;
    }

    .btn:hover{
      background:#00cccc;
    }

    h2{
      border-left:4px solid #0ff;
      padding-left:10px;
      margin-top:40px;
    }

    .search{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:none;
      margin-top:20px;
      font-size:16px;
    }

  </style>
</head>

<body>

  <div class="title">Aqib ki Website</div>

  <div class="container">

    <!-- MAIN LINK -->
    <a class="main-link" href="https://your-main-link.com">
      🏠 MAIN PAGE / HOME LINK
    </a>

    <input class="search" type="text" placeholder="Search files... (UI only)">

    <!-- VIDEOS -->
    <div class="section">
      <h2>🎬 Videos</h2>

      <div class="card">
        <span>My Video 1</span>
        <a class="btn" href="">Download</a>
      </div>

      <div class="card">
        <span>My Video 2</span>
        <a class="btn" href="YOUR_LINK_2">Download</a>
      </div>
    </div>

    <!-- GAMES -->
    <div class="section">
      <h2>🎮 Games</h2>

      <div class="card">
        <span>Game File</span>
        <a class="btn" href="https://drive.google.com/drive/folders/1dOtvS3ePFZynZgUQVuxIMz1Ftud4k6D7">Download</a>
      </div>
    </div>

    <!-- APPS -->
    <div class="section">
      <h2>📱 Apps</h2>

      <div class="card">
        <span>App File</span>
        <a class="btn" href="YOUR_LINK_4">Download</a>
      </div>
    </div>

  </div>

</body>
</html>
